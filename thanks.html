<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Thank you for reaching out to Prithvi Buildtech Construction. We appreciate your time and will get back to you soon with the best solutions for your construction needs."
    />
    <link rel="icon" href="icons/favicon-Prithvi Buildtech.ico" />
    <title>Thank You | Prithvi Buildtech Construction</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .container.thanks {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
        color: #333;
        background-color: #f8f9fa;
        padding: 20px;
      }
      .thanks h1 {
        font-size: 2.5rem;
        font-weight: bold;
        color: #d4a017;
      }
      .thanks p {
        font-size: 1.2rem;
        max-width: 600px;
        margin: 15px auto;
        line-height: 1.6;
      }
      .button {
        background-color: #d4a017;
        color: #fff;
        padding: 12px 25px;
        border: none;
        border-radius: 50px;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
      }
      .button a {
        text-decoration: none;
        color: white;
        font-weight: bold;
      }
      .button:hover {
        background-color: #b78c13;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container thanks">
        <h1>Thank You!</h1>
        <p>
          Your request has been received. Our team at
          <strong>Prithvi Buildtech Construction</strong> is reviewing your
          inquiry, and we will reach out to you shortly.
        </p>

        <button class="button"><a href="/">Back to Home</a></button>
      </div>
    </main>
  </body>
</html>
